name: Refresh live data

# Fetches NDBC buoy obs + NHC active-storm cone server-side (no CORS limits in CI)
# and commits them as same-origin files the GitHub Pages site can read reliably.

on:
  schedule:
    - cron: '*/30 * * * *'    # every 30 min (GitHub may delay/coalesce under load)
  workflow_dispatch:           # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write              # needed to commit the refreshed data back

concurrency:
  group: live-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch NDBC + NHC snapshots
        run: python build_live_data.py

      - name: Commit if changed
        run: |
          git config user.name  "rapidwatch-bot"
          git config user.email "aphilp1@users.noreply.github.com"
          git add data/ndbc data/nhc_currentstorms.json
          if [ -d data/nhc ]; then git add data/nhc; fi   # only exists when storms are active
          if git diff --cached --quiet; then
            echo "No data changes this run."
          else
            git commit -m "data: refresh live buoy/NHC snapshot [skip ci]"
            git push
          fi
